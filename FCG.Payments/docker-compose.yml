version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL","/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_password123 -Q \"SELECT 1\"" ]
      interval: 10s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"

  paymentsapi:
    build: ./FCG.Payments
    ports:
      - "5000:80"
    environment:
      - SQL_CONNECTION=Server=sqlserver,1433;Database=PaymentsDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - USE_INMEMORY_BUS=true

  functions:
    build: ./FCG.Payments/Functions
    environment:
      - SQL_CONNECTION=Server=sqlserver,1433;Database=PaymentsDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - USE_INMEMORY_BUS=true
